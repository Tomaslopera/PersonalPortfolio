<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Education — Tomás Lopera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
.edu-body { padding: 3.5rem 5rem 5rem; }

.edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 4rem; }
.edu-card { background: var(--white); border: 1px solid var(--mid); border-radius: 14px; padding: 2.25rem; transition: box-shadow 0.25s; }
.edu-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
.edu-card-primary { border-top: 3px solid var(--blue-mid); }
.edu-period { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--faint); margin-bottom: 0.6rem; }
.edu-school { font-family: 'DM Serif Display', serif; font-size: 1.6rem; line-height: 1.2; margin-bottom: 0.5rem; }
.edu-degree { font-size: 0.88rem; font-weight: 600; color: var(--blue); margin-bottom: 1.1rem; }
.edu-detail { font-size: 0.85rem; color: var(--muted); line-height: 1.75; }
.edu-focus-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1.2rem; }
.focus-chip { font-size: 0.72rem; font-weight: 500; padding: 0.28rem 0.7rem; border-radius: 100px; background: var(--blue-light); color: var(--blue); font-family: 'JetBrains Mono', monospace; }

.lang-section { margin-bottom: 4rem; }
.lang-grid { display: grid; grid-template-columns: repeat(2, 260px); gap: 1rem; }
.lang-card { background: var(--off); border: 1px solid var(--mid); border-radius: 12px; padding: 1.4rem 1.75rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
.lang-name { font-family: 'DM Serif Display', serif; font-size: 1.3rem; }
.lang-level { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 100px; }
.lang-native { background: var(--teal-light); color: var(--teal); }
.lang-b2 { background: var(--blue-light); color: var(--blue); }

.certs-section { margin-bottom: 4rem; }
.certs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
.cert-card { background: var(--white); border: 1px solid var(--mid); border-radius: 14px; padding: 1.75rem; display: flex; flex-direction: column; transition: transform 0.22s, box-shadow 0.22s; }
.cert-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
.cert-card-top { height: 3px; border-radius: 14px 14px 0 0; margin: -1.75rem -1.75rem 1.25rem; }
.cert-provider-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 100px; margin-bottom: 0.75rem; width: fit-content; }
.cert-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; line-height: 1.3; margin-bottom: 1rem; flex: 1; }
.cert-skills { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.1rem; }
.cert-skill-tag { font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; padding: 0.2rem 0.5rem; background: var(--light); color: var(--muted); border-radius: 4px; }
.cert-date { font-size: 0.73rem; color: var(--faint); font-family: 'JetBrains Mono', monospace; margin-bottom: 0.5rem; }
.cert-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.76rem; font-weight: 600; text-decoration: none; margin-top: auto; transition: gap 0.15s; }
.cert-link:hover { gap: 0.5rem; }

.soft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
.soft-item { background: var(--off); border: 1px solid var(--mid); border-radius: 10px; padding: 1rem 1.2rem; font-size: 0.87rem; font-weight: 500; transition: background 0.15s, border-color 0.15s, transform 0.2s; }
.soft-item:hover { background: var(--blue-light); border-color: #b5d4f4; transform: translateY(-2px); }

.section-group { margin-bottom: 1.5rem; }

@media (max-width: 1024px) {
  .edu-body { padding: 2.5rem 2rem 4rem; }
  .edu-grid { grid-template-columns: 1fr; }
  .certs-grid { grid-template-columns: 1fr 1fr; }
  .soft-grid { grid-template-columns: 1fr 1fr; }
  .lang-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 640px) {
  .certs-grid, .soft-grid, .lang-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <header class="page-header">
    <div class="page-header-eyebrow">Background</div>
    <h1>Education</h1>
    <p>Software Engineering degree at EIA University with a focus on data and AI, complemented by industry certifications in deep learning, NLP, and prompt engineering.</p>
  </header>

  <div class="edu-body">

    <div class="section-group">
      <div class="section-label">Formal Education</div>
    </div>
    <div class="edu-grid" id="edu-grid"></div>

    <div class="lang-section">
      <div class="section-group"><div class="section-label">Languages</div></div>
      <div class="lang-grid" id="lang-grid"></div>
    </div>

    <div class="certs-section">
      <div class="section-group">
        <div class="section-label">Certifications</div>
      </div>
      <div class="certs-grid" id="certs-grid"></div>
    </div>

    <div class="soft-section">
      <div class="section-group"><div class="section-label">Soft Skills</div></div>
      <div class="soft-grid" id="soft-grid"></div>
    </div>

  </div>
</div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script>
/* 1 — Render content */
const langClass = { native: 'lang-native', b2: 'lang-b2' };

document.getElementById('edu-grid').innerHTML = DATA.education.map((e, i) => `
  <div class="edu-card ${e.primary ? 'edu-card-primary' : ''} reveal" style="transition-delay:${i * 0.08}s">
    <div class="edu-period">${e.period}</div>
    <h2 class="edu-school">${e.school}</h2>
    <div class="edu-degree"${!e.primary ? ' style="color:var(--muted)"' : ''}>${e.degree}</div>
    <p class="edu-detail">${e.detail}</p>
    ${e.focus.length ? `<div class="edu-focus-chips">${e.focus.map(f => `<span class="focus-chip">${f}</span>`).join('')}</div>` : ''}
  </div>`).join('');

document.getElementById('lang-grid').innerHTML = DATA.languages.map((l, i) => `
  <div class="lang-card reveal" style="transition-delay:${i * 0.06}s">
    <span class="lang-name">${l.name}</span>
    <span class="lang-level ${langClass[l.style] || ''}">${l.level}</span>
  </div>`).join('');

document.getElementById('certs-grid').innerHTML = DATA.certifications.map((c, i) => `
  <div class="cert-card reveal" style="transition-delay:${i * 0.07}s">
    <div class="cert-card-top" style="background:${c.color}"></div>
    <span class="cert-provider-badge" style="background:${c.color}22; color:${c.color}">${c.provider}</span>
    <div class="cert-date">${c.date}</div>
    <h3 class="cert-name">${c.name}</h3>
    <div class="cert-skills">${c.skills.map(s => `<span class="cert-skill-tag">${s}</span>`).join('')}</div>
    <a href="${c.link}" target="_blank" class="cert-link" style="color:${c.color}">View certificate →</a>
  </div>`).join('');

document.getElementById('soft-grid').innerHTML = DATA.softSkills.map((s, i) => `
  <div class="soft-item reveal" style="transition-delay:${i * 0.04}s">${s}</div>`).join('');

/* 2 — Init reveal AFTER content is rendered */
initReveal();
</script>
</body>
</html>
